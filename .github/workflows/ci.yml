name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
      - "feature/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write        # required by publish-unit-test-result-action

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Check formatting with Black
        run: uv run black --check .

      - name: Type check with MyPy
        run: uv run mypy app

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          GROQ_API_KEY: dummy_key_for_tests
          LLM_MODEL: llama-3.3-70b-versatile
          CELERY_BROKER_URL: amqp://guest:guest@localhost:5672//
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USERNAME: test@example.com
          SMTP_PASSWORD: testpassword
          EMAIL_FROM: test@example.com
          SMTP_USE_TLS: "true"
        run: |
          uv run pytest tests/ \
            --tb=short \
            --no-header \
            -q \
            --junit-xml=reports/test-results.xml

      - name: Publish test summary
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: reports/test-results.xml

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Compose builds
        run: docker compose build --no-cache
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_content_db
          REDIS_URL: redis://redis:6379/0
          GROQ_API_KEY: dummy
          LLM_MODEL: llama-3.3-70b-versatile
          CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
          CELERY_RESULT_BACKEND: redis://redis:6379/0
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USERNAME: test@example.com
          SMTP_PASSWORD: testpassword
          EMAIL_FROM: test@example.com
          SMTP_USE_TLS: "true"